name: Android arm64 Release APK

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: app

env:
  JAVA_VERSION: "17"
  FLUTTER_CHANNEL: "stable"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"

jobs:
  build:
    name: Build arm64-v8a release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit test
        run: flutter test

      - name: Build arm64-v8a release APK
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --obfuscate \
            --split-debug-info=build/symbols

      - name: Rename APK
        run: |
          mkdir -p build/release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/release-artifacts/time-journal-arm64-v8a-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: time-journal-arm64-v8a-release
          path: app/build/release-artifacts/time-journal-arm64-v8a-release.apk
          if-no-files-found: error
